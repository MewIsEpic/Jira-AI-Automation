name: Requirements & Test Case Pipeline

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: 'Jira Issue Key (e.g., SE-1)'
        required: true
        type: string

jobs:
  process-issue:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          sleep 20
          ollama pull llama3
      
      - name: Setup Knowledge Base
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY || 'SEAD' }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'SE' }}
        run: python -m rag.rag_system setup
      
      - name: Process Jira Issue
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python main.py ${{ github.event.inputs.issue_key }}

